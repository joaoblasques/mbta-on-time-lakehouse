# The medallion-refresh job as code: bronze_rt → silver_lateness → gold_otp, hourly.
# The bundle uploads the three notebooks (from databricks/notebooks/) to the workspace and
# wires this multi-task DAG to them. No cluster block → serverless (Free Edition default).

resources:
  jobs:
    medallion_refresh:
      name: mbta-medallion-refresh
      max_concurrent_runs: 1
      schedule:
        quartz_cron_expression: "0 17 * * * ?" # hourly at :17 past
        timezone_id: Etc/UTC
        pause_status: UNPAUSED

      tasks:
        - task_key: bronze_rt
          notebook_task:
            notebook_path: ../databricks/notebooks/03_bronze_rt.py

        - task_key: silver_lateness
          depends_on:
            - task_key: bronze_rt
          notebook_task:
            notebook_path: ../databricks/notebooks/04_silver_lateness.py

        - task_key: gold_otp
          depends_on:
            - task_key: silver_lateness
          notebook_task:
            notebook_path: ../databricks/notebooks/05_gold_otp.py
