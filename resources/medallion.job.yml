# The medallion-refresh job as code: bronze_rt → silver_lateness → gold_otp, hourly.
# The bundle uploads the three notebooks AND builds + attaches the `transforms` wheel (see
# `artifacts` in databricks.yml) so silver/gold import the tested module. No cluster → serverless.

resources:
  jobs:
    medallion_refresh:
      name: mbta-medallion-refresh
      max_concurrent_runs: 1
      schedule:
        quartz_cron_expression: "0 17 * * * ?" # hourly at :17 past
        timezone_id: Etc/UTC
        pause_status: UNPAUSED

      # Serverless environment carrying the tested transforms wheel (built by the bundle).
      environments:
        - environment_key: transforms
          spec:
            client: "3"
            dependencies:
              - ../dist/*.whl # relative to this file (resources/) → repo-root/dist/

      tasks:
        - task_key: bronze_rt # decodes protobuf via %pip gtfs-realtime-bindings (no wheel needed)
          notebook_task:
            notebook_path: ../databricks/notebooks/03_bronze_rt.py

        - task_key: silver_lateness
          environment_key: transforms # → imports transforms.lateness
          depends_on:
            - task_key: bronze_rt
          notebook_task:
            notebook_path: ../databricks/notebooks/04_silver_lateness.py

        - task_key: gold_otp
          environment_key: transforms # → imports transforms.otp
          depends_on:
            - task_key: silver_lateness
          notebook_task:
            notebook_path: ../databricks/notebooks/05_gold_otp.py
