name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0 # pinned exact: no floating @v8 major tag is published
      - name: Python
        run: uv python install 3.12.8
      - name: Install deps
        run: uv sync --all-groups
      - name: Java (for Spark integration tests)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Tests (pytest — unit + Spark integration)
        run: uv run pytest -q

  terraform:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.12.1
      - name: Format check
        run: terraform -chdir=terraform fmt -check -recursive
      - name: Validate (no backend, no creds)
        run: |
          terraform -chdir=terraform init -backend=false
          terraform -chdir=terraform validate

  json:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Validate dashboard JSON
        run: |
          python3 -m json.tool dashboards/otp.lvdash.json > /dev/null
          echo "JSON valid"

# NOTE — the medallion job is now a Databricks Asset Bundle (databricks.yml + resources/), and
# `terraform plan→apply` gating runs in terraform.yml (keyless via GCP Workload Identity
# Federation). The jobs above stay credential-free so CI is fast and safe.
