name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install 3.12.8

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint
        run: uv run ruff check .

      - name: Tests
        run: uv run pytest -q

  terraform-validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.1
      - name: Terraform fmt + validate
        working-directory: terraform
        run: |
          terraform fmt -check -recursive || true   # TODO: drop '|| true' once tf exists
          test -f main.tf && terraform init -backend=false && terraform validate || echo "no terraform yet"
